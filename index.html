<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <title>NEWS Akkshu</title>
    <style>
        .lang-bar { display: flex; justify-content: center; padding: 15px; gap: 20px; background: #f8f8f8; }
        .lang-bar button { padding: 8px 16px; cursor: pointer; border: none; background: #d32f2f; color: white; border-radius: 4px; font-weight: bold; }
        header { text-align: center; padding: 20px; }
        header img { width: 250px; cursor: pointer; } /* यहाँ लोगो का साइज़ सेट है */
        .news-card { background: white; padding: 15px; margin: 10px auto; max-width: 600px; border-radius: 8px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button onclick="loadNews('hindi')">Hindi</button>
        <button onclick="loadNews('english')">English</button>
        <button onclick="loadNews('gujarati')">Gujarati</button>
    </div>

    <header>
        <!-- यहाँ आपका लोगो 1000678471.png लगाया गया है -->
        <img src="1000678471.png" id="logo" onclick="logoClick()" alt="NEWS Akkshu Logo">
        <h1>NEWS Akkshu</h1>
    </header>

    <div id="newsContainer"></div>

    <script>
        let clicks = 0;
        function logoClick() {
            clicks++;
            if(clicks === 5) {
                window.location.href = "admin.html"; // 5 क्लिक पर एडमिन पैनल
            }
        }

        function loadNews(cat) {
            // यहाँ Firebase से डेटा लोड करने का कोड आएगा
            document.getElementById('newsContainer').innerHTML = "Loading " + cat + " news...";
        }
    </script>
</body>
</html>
