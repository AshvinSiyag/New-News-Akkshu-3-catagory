<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEADLINE NEWS 24×7</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4298712782505661" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; margin: 0; padding: 0; }
        .lang-bar { display: flex; flex-wrap: wrap; justify-content: center; padding: 15px; gap: 10px; background: #fff; position: sticky; top: 0; z-index: 1000; }
        button { padding: 10px 15px; cursor: pointer; border: none; background: #d32f2f; color: white; border-radius: 5px; font-weight: bold; }
        .weather-btn { background: #2575fc; }
        header img { width: 200px; cursor: pointer; margin-top: 20px; }
        .news-card { background: white; padding: 20px; margin: 15px auto; max-width: 600px; border-radius: 10px; cursor: pointer; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .news-card h3 { margin: 0; color: #333; }
        #weatherContainer { display: none; padding: 20px; max-width: 600px; margin: 0 auto; background: white; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button onclick="loadNews('Hindi')">Hindi</button>
        <button onclick="loadNews('English')">English</button>
        <button onclick="loadNews('Gujarati')">Gujarati</button>
        <button class="weather-btn" onclick="showWeather()">હવામાન & AQI</button>
    </div>

    <header>
        <img src="1000678471.png" id="logo" onclick="logoClick()">
        <h1>HEADLINE NEWS 24×7</h1>
    </header>

    <div id="weatherContainer">
        <h3>शहर चुनें</h3>
        <select id="citySelect" onchange="fetchWeatherData()">
            <option value="Ahmedabad">Ahmedabad</option>
            <option value="Surat">Surat</option>
            <option value="Rajkot">Rajkot</option>
        </select>
        <div id="weatherResult" style="margin-top:20px;"></div>
    </div>

    <div id="newsContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAOTuJcjYGPld5wZYVPHK0jpXKAh561lVU", authDomain: "news-akkshu.firebaseapp.com", projectId: "news-akkshu", storageBucket: "news-akkshu.firebasestorage.app", messagingSenderId: "735024392453", appId: "1:735024392453:web:30f8a1f0832ff36b1fef6c" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showWeather() {
            document.getElementById('newsContainer').style.display = 'none';
            document.getElementById('weatherContainer').style.display = 'block';
            fetchWeatherData();
        }

        function fetchWeatherData() {
            const city = document.getElementById('citySelect').value;
            const apiKey = "C3d2062e4f2ab500d532b35b6b6d9059";
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}&lang=hi`;

            document.getElementById('weatherResult').innerHTML = "लोड हो रहा है...";

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('weatherResult').innerHTML = `
                        <h3>${city} का मौसम</h3>
                        <p>तापमान: ${data.main.temp}°C</p>
                        <p>स्थिति: ${data.weather[0].description}</p>
                        <p>नमी (Humidity): ${data.main.humidity}%</p>
                    `;
                })
                .catch(err => {
                    document.getElementById('weatherResult').innerHTML = "डेटा लोड नहीं हो पाया।";
                });
        }

        function loadNews(cat) {
            document.getElementById('newsContainer').style.display = 'block';
            document.getElementById('weatherContainer').style.display = 'none';
            db.collection("allNews").where("category", "==", cat).orderBy("timestamp", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('newsContainer');
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    container.innerHTML += `<div class="news-card" onclick="window.location.href='details.html?id=${doc.id}'"><h3>${doc.data().heading}</h3></div>`;
                });
            });
        }

        function logoClick() {
            let pass = prompt("Enter Admin Password:");
            if (pass === "Akkshu@love") window.location.href = "admin.html";
        }

        window.onload = function() { loadNews('Hindi'); };
    </script>
</body>
</html>
