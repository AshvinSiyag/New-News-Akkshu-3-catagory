<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEADLINE NEWS 24×7</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e2e8f0; text-align: center; margin: 0; }
        .lang-bar { display: flex; flex-wrap: wrap; justify-content: center; padding: 15px; gap: 10px; background: #fff; position: sticky; top: 0; z-index: 1000; }
        button { padding: 10px 15px; cursor: pointer; border: none; background: #d32f2f; color: white; border-radius: 5px; font-weight: 900; }
        .main-panel { background: #ffffff; padding: 25px; border-radius: 20px; max-width: 500px; margin: 20px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; }
        h1, h3 { font-weight: 900; color: #1a202c; }
        select { width: 100%; padding: 12px; font-weight: bold; border-radius: 10px; border: 2px solid #cbd5e0; margin: 15px 0; }
        .info-box { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #cbd5e0; font-weight: 800; font-size: 1.1em; color: #4a5568; }
        .market-item { display: flex; justify-content: space-between; padding: 12px; font-weight: 900; border-bottom: 2px solid #e2e8f0; color: #000; }
        .up { color: #2f855a; } .down { color: #c53030; }
        .news-card { background: white; padding: 15px; margin: 10px auto; max-width: 500px; border-radius: 10px; cursor: pointer; text-align: left; }
        .share-btn { color: #25d366; font-size: 14px; font-weight: bold; margin-top: 5px; }
        #logo { width: 200px; cursor: pointer; margin-top: 10px; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4298712782505661"
     crossorigin="anonymous"></script>
</head>
<body>

    <div class="lang-bar">
        <button onclick="loadNews('Hindi')">Hindi</button>
        <button onclick="loadNews('English')">English</button>
        <button onclick="loadNews('Gujarati')">Gujarati</button>
        <button onclick="showSection('weatherContainer')">હવામાન</button>
        <button onclick="showSection('marketContainer')">બજાર</button>
    </div>

    <img src="1000678471.png" id="logo" onclick="logoClick()">

    <div id="mainPanel" class="main-panel">
        <div id="weatherContainer" style="display:none;">
            <h3>ગુજરાતના જિલ્લા અને ગામ પસંદ કરો</h3>
            <select id="citySelect" onchange="fetchWeatherData()">
                <option value="Ahmedabad">અમદાવાદ</option>
                <option value="Surat">સુરત</option>
                <option value="Rajkot">રાજકોટ</option>
                <option value="Deesa">ડીસા</option>
            </select>
            <div id="weatherResult" class="info-box">પસંદ કરો...</div>
        </div>

        <div id="marketContainer" style="display:none;">
            <h3>બજારના લાઈવ ભાવ</h3>
            <div id="marketResult">લોડ થઈ રહ્યું છે...</div>
        </div>
    </div>

    <div id="newsContainer"></div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAOTuJcjYGPld5wZYVPHK0jpXKAh561lVU", authDomain: "news-akkshu.firebaseapp.com", projectId: "news-akkshu", storageBucket: "news-akkshu.firebasestorage.app", messagingSenderId: "735024392453", appId: "1:735024392453:web:30f8a1f0832ff36b1fef6c" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showSection(id) {
            document.getElementById('newsContainer').innerHTML = '';
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('weatherContainer').style.display = (id === 'weatherContainer') ? 'block' : 'none';
            document.getElementById('marketContainer').style.display = (id === 'marketContainer') ? 'block' : 'none';
            if(id === 'marketContainer') fetchMarketData();
            if(id === 'weatherContainer') fetchWeatherData();
        }

        function loadNews(cat) {
            document.getElementById('mainPanel').style.display = 'none';
            db.collection("allNews").where("category", "==", cat).orderBy("timestamp", "desc").onSnapshot(s => {
                const c = document.getElementById('newsContainer');
                c.innerHTML = '';
                s.forEach(doc => {
                    const d = doc.data();
                    // यहाँ न्यूज़ कार्ड पर क्लिक करने का लिंक और शेयर बटन वापस ला दिया है
                    c.innerHTML += `
                        <div class="news-card" onclick="window.location.href='details.html?id=${doc.id}'">
                            <h3>${d.heading}</h3>
                            <div class="share-btn">Read & Share ➔</div>
                        </div>`;
                });
            });
        }

        async function fetchMarketData() {
            try {
                const res = await fetch(`https://api.twelvedata.com/quote?symbol=^BSESN,^NSEI,GOLD,SILVER,BTC/USD&apikey=89dc6593e9fb4ddf9071da2b5d9db4f0`);
                const data = await res.json();
                let html = "";
                for (let key in data) {
                    let s = data[key];
                    let price = (s.close) ? parseFloat(s.close).toFixed(2) : "N/A";
                    let change = (s.percent_change) ? parseFloat(s.percent_change).toFixed(2) : "0.00";
                    html += `<div class="market-item"><span>${key.replace('^BSESN','SENSEX').replace('^NSEI','NIFTY50')}</span><span class="${change >= 0 ? 'up' : 'down'}">${price} (${change}%)</span></div>`;
                }
                document.getElementById('marketResult').innerHTML = html;
            } catch(e) { document.getElementById('marketResult').innerHTML = "डेटा लोड नहीं हो सका."; }
        }

        async function fetchWeatherData() {
            const city = document.getElementById('citySelect').value;
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=c3d2062e4f2ab500d532b35b6b6d9059&lang=gu`);
            const data = await res.json();
            document.getElementById('weatherResult').innerHTML = `
                <div style="font-size: 1.2em;">${city} નું હવામાન</div>
                <div>તાપમાન: ${data.main.temp}°C</div>
                <div>સ્થિતિ: ${data.weather[0].description}</div>
            `;
        }

        let clickCount = 0;
        function logoClick() {
            clickCount++;
            if (clickCount >= 5) {
                clickCount = 0;
                let pass = prompt("Enter Admin Password:");
                if (pass === "Akkshu@love") window.location.href = "admin.html";
            }
        }
        window.onload = () => loadNews('Gujarati');
    </script>
</body>
</html>
