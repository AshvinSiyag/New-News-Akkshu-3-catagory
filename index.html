<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEADLINE NEWS 24×7</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4298712782505661" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; margin: 0; padding: 0; }
        .lang-bar { display: flex; flex-wrap: wrap; justify-content: center; padding: 15px; gap: 10px; background: #fff; position: sticky; top: 0; z-index: 1000; }
        button { padding: 10px 15px; cursor: pointer; border: none; background: #d32f2f; color: white; border-radius: 5px; font-weight: bold; }
        .weather-btn { background: #4a5568; }
        .market-btn { background: #d69e2e; }
        header img { width: 200px; cursor: pointer; margin-top: 20px; }
        .news-card { background: white; padding: 20px; margin: 15px auto; max-width: 600px; border-radius: 10px; cursor: pointer; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .news-card h3 { margin: 0; color: #333; font-weight: bold; }
        .share-btn { margin-top: 5px; color: #25d366; font-size: 14px; font-weight: bold; }
        #weatherContainer, #marketContainer { display: none; padding: 20px; max-width: 600px; margin: 20px auto; background: #cbd5e0; border-radius: 15px; color: #2d3748; }
        #citySelect { padding: 10px; border-radius: 5px; width: 100%; max-width: 300px; margin-bottom: 15px; }
        .market-item { background: white; padding: 12px; margin: 8px 0; border-radius: 8px; display: flex; justify-content: space-between; font-weight: bold; color: #000; }
        .up { color: green; }
        .down { color: red; }
        .ad-slot { margin: 15px auto; max-width: 600px; min-height: 100px; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button onclick="loadNews('Hindi')">Hindi</button>
        <button onclick="loadNews('English')">English</button>
        <button onclick="loadNews('Gujarati')">Gujarati</button>
        <button class="weather-btn" onclick="showSection('weatherContainer')">હવામાન & AQI</button>
        <button class="market-btn" onclick="showSection('marketContainer')">બજાર</button>
    </div>

    <div class="ad-slot"><ins class="adsbygoogle" style="display:block" data-ad-format="auto" data-ad-client="ca-pub-4298712782505661" data-ad-slot="1000000001"></ins></div>

    <header>
        <img src="1000678471.png" id="logo" onclick="logoClick()">
        <h1>HEADLINE NEWS 24×7</h1>
    </header>

    <div id="weatherContainer">
        <h3>ગુજરાતના જિલ્લા અને ગામ પસંદ કરો</h3>
        <select id="citySelect" onchange="fetchWeatherData()">
            <option value="Ahmedabad">અમદાવાદ</option>
            <option value="Surat">સુરત</option>
            <option value="Rajkot">રાજકોટ</option>
            <option value="Palanpur">પાલનપુર</option>
            <option value="Deesa">ડીસા</option>
            <option value="Rampura">રામપુરા (ડીસા)</option>
        </select>
        <div id="weatherResult" style="margin-top:20px; background: rgba(255,255,255,0.7); padding: 15px; border-radius: 10px;">
            <p>જિલ્લો કે ગામ પસંદ કરો...</p>
        </div>
    </div>

    <div id="marketContainer">
        <h3>બજારના લાઈવ ભાવ</h3>
        <div id="marketResult">લોડ થઈ રહ્યું છે...</div>
    </div>

    <div class="ad-slot"><ins class="adsbygoogle" style="display:block" data-ad-format="auto" data-ad-client="ca-pub-4298712782505661" data-ad-slot="2000000002"></ins></div>
    <div id="newsContainer"></div>
    <div class="ad-slot"><ins class="adsbygoogle" style="display:block" data-ad-format="auto" data-ad-client="ca-pub-4298712782505661" data-ad-slot="3000000003"></ins></div>
    <div class="ad-slot"><ins class="adsbygoogle" style="display:block" data-ad-format="auto" data-ad-client="ca-pub-4298712782505661" data-ad-slot="4000000004"></ins></div>
    <div class="ad-slot"><ins class="adsbygoogle" style="display:block" data-ad-format="auto" data-ad-client="ca-pub-4298712782505661" data-ad-slot="5000000005"></ins></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAOTuJcjYGPld5wZYVPHK0jpXKAh561lVU", authDomain: "news-akkshu.firebaseapp.com", projectId: "news-akkshu", storageBucket: "news-akkshu.firebasestorage.app", messagingSenderId: "735024392453", appId: "1:735024392453:web:30f8a1f0832ff36b1fef6c" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function fetchMarketData() {
            const apiKey = "89dc6593e9fb4ddf9071da2b5d9db4f0"; 
            const symbols = "SENSEX,NIFTY50,GOLD,SILVER,BTC/USD,RELIANCE,TCS,HDFCBANK";
            fetch(`https://api.twelvedata.com/quote?symbol=${symbols}&apikey=${apiKey}`)
                .then(res => res.json())
                .then(data => {
                    let html = "<h3>બજારના લાઈવ ભાવ</h3>";
                    for (let key in data) {
                        let s = data[key];
                        let change = parseFloat(s.percent_change).toFixed(2);
                        html += `<div class="market-item"><span>${key}</span><span class="${change >= 0 ? 'up' : 'down'}">${parseFloat(s.close).toFixed(2)} (${change}%)</span></div>`;
                    }
                    document.getElementById('marketResult').innerHTML = html;
                });
        }
        setInterval(fetchMarketData, 30000);

        function showSection(id) {
            document.getElementById('newsContainer').style.display = id === 'newsContainer' ? 'block' : 'none';
            document.getElementById('weatherContainer').style.display = id === 'weatherContainer' ? 'block' : 'none';
            document.getElementById('marketContainer').style.display = id === 'marketContainer' ? 'block' : 'none';
            if(id === 'weatherContainer') fetchWeatherData();
            if(id === 'marketContainer') fetchMarketData();
        }

        function fetchWeatherData() {
            const city = document.getElementById('citySelect').value;
            fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=c3d2062e4f2ab500d532b35b6b6d9059&lang=gu`)
                .then(res => res.json())
                .then(data => document.getElementById('weatherResult').innerHTML = `<h3>${city} નું હવામાન</h3><p>તાપમાન: ${data.main.temp}°C</p>`);
        }

        function loadNews(cat) {
            document.getElementById('newsContainer').style.display = 'block';
            document.getElementById('marketContainer').style.display = 'none';
            document.getElementById('weatherContainer').style.display = 'none';
            db.collection("allNews").where("category", "==", cat).orderBy("timestamp", "desc").onSnapshot(s => {
                const c = document.getElementById('newsContainer');
                c.innerHTML = '';
                s.forEach(doc => {
                    const d = doc.data();
                    c.innerHTML += `<div class="news-card" onclick="window.location.href='details.html?id=${doc.id}'"><h3>${d.heading}</h3><div class="share-btn">Read & Share ➔</div></div>`;
                });
            });
        }

        function logoClick() { if (prompt("Enter Admin Password:") === "Akkshu@love") window.location.href = "admin.html"; }
        window.onload = () => loadNews('Hindi');
    </script>
</body>
</html>
