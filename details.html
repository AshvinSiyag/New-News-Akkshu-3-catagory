<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Details - NEWS Akkshu</title>
    <meta property="og:type" content="article">
    <meta property="og:title" id="og-title" content="NEWS Akkshu">
    <meta property="og:description" id="og-desc" content="पूरी खबर पढ़ने के लिए यहाँ क्लिक करें।">
    <meta property="og:image" id="og-image" content="https://amazybuy.shop/1000678471.png">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4298712782505661" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background: #f9f9f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-header { text-align: center; margin-bottom: 20px; }
        .logo-header img { width: 150px; cursor: pointer; }
        .back-btn { display: inline-block; margin-bottom: 20px; padding: 10px 15px; background: #333; color: white; text-decoration: none; border-radius: 5px; }
        .news-image { width: 100%; border-radius: 8px; margin-top: 15px; }
        .ad-container { margin: 20px 0; min-height: 100px; text-align: center; }
        .share-btn { background: #25d366; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 20px 0; font-size: 16px; }
        .stats { color: #555; font-size: 14px; margin-bottom: 10px; }
        .more-news { margin-top: 40px; border-top: 2px solid #ddd; padding-top: 20px; }
        .more-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-header">
            <img src="1000678471.png" onclick="window.location.href='index.html'">
        </div>
        <a href="index.html" class="back-btn">← Back</a>
        
        <div id="newsContent">Loading news...</div>

        <div class="more-news">
            <h3>Read More News</h3>
            <div id="moreNewsList"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAOTuJcjYGPld5wZYVPHK0jpXKAh561lVU", authDomain: "news-akkshu.firebaseapp.com", projectId: "news-akkshu", storageBucket: "news-akkshu.firebasestorage.app", messagingSenderId: "735024392453", appId: "1:735024392453:web:30f8a1f0832ff36b1fef6c" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const id = new URLSearchParams(window.location.search).get('id');

        function createAd() {
            return `<div class="ad-container"><ins class="adsbygoogle" style="display:block" data-ad-format="auto" data-ad-full-width-responsive="true" data-ad-client="ca-pub-4298712782505661"></ins></div>`;
        }

        if (id) {
            const docRef = db.collection("allNews").doc(id);
            
            // 1. व्यूज़ बढ़ाएं
            docRef.update({ views: firebase.firestore.FieldValue.increment(1) }).catch(() => {});

            // 2. रीयल-टाइम अपडेट के लिए onSnapshot
            docRef.onSnapshot(doc => {
                if (doc.exists) {
                    const d = doc.data();
                    
                    let dateStr = "";
                    if (d.timestamp) {
                        const date = d.timestamp.toDate();
                        dateStr = date.toLocaleDateString('hi-IN') + " " + date.toLocaleTimeString('hi-IN', {hour: '2-digit', minute:'2-digit'});
                    }

                    let topFixAd = createAd(); 
                    let bottomFixAd = createAd();
                    let extraAds = [];
                    if (d.adOption === "banner" || d.adOption === "all") {
                        let count = parseInt(d.adCount) || 0;
                        for(let i = 0; i < count; i++) { extraAds.push(createAd()); }
                    }

                    let paragraphs = d.details.split('\n\n');
                    let htmlContent = "";
                    paragraphs.forEach((p, index) => {
                        htmlContent += `<p style="white-space: pre-line;">${p}</p>`;
                        if (index === 0 && extraAds[0]) htmlContent += extraAds[0];
                        if (index === Math.floor(paragraphs.length / 2) && extraAds[1]) htmlContent += extraAds[1];
                        if (index === paragraphs.length - 1 && extraAds[2]) htmlContent += extraAds[2];
                    });

                    document.getElementById('newsContent').innerHTML = `
                        <h1>${d.heading}</h1>
                        <p class="stats">📅 ${dateStr} | 👁️ ${d.views || 0} Views</p>
                        ${topFixAd}
                        <img src="${d.image}" class="news-image">
                        ${htmlContent}
                        <button class="share-btn" onclick="window.open('https://wa.me/?text='+encodeURIComponent(document.title+'\\n\\nयहाँ पढ़ें: '+window.location.href))">WhatsApp पर शेयर करें</button>
                        ${bottomFixAd}
                    `;
                    
                    const ads = document.getElementsByClassName('adsbygoogle');
                    for (let i = 0; i < ads.length; i++) { (adsbygoogle = window.adsbygoogle || []).push({}); }
                }
            });
        }

        db.collection("allNews").orderBy("timestamp", "desc").limit(5).onSnapshot(snapshot => {
            const list = document.getElementById('moreNewsList');
            list.innerHTML = '';
            snapshot.forEach(doc => {
                if(doc.id !== id) {
                    list.innerHTML += `<div class="more-item" onclick="window.location.href='details.html?id=${doc.id}'">${doc.data().heading}</div>`;
                }
            });
        });
    </script>
</body>
</html>
