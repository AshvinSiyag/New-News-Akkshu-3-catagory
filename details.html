<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- WhatsApp और Social Media Preview के लिए मेटा टैग्स -->
    <meta property="og:title" id="og-title" content="NEWS Akkshu">
    <meta property="og:description" id="og-desc" content="पूरी खबर पढ़ने के लिए यहाँ क्लिक करें।">
    <meta property="og:image" id="og-image" content="https://amazybuy.shop/1000678471.png">
    <meta property="og:type" content="article">
    
    <title>News Details - NEWS Akkshu</title>
    
    <!-- AdSense Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4298712782505661" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background: #f9f9f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .news-image { width: 100%; border-radius: 8px; margin-top: 15px; }
        .ad-container { margin: 20px 0; min-height: 100px; }
        .delete-btn { background: #d32f2f; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container" id="newsContent">Loading news...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAOTuJcjYGPld5wZYVPHK0jpXKAh561lVU",
            authDomain: "news-akkshu.firebaseapp.com",
            projectId: "news-akkshu",
            storageBucket: "news-akkshu.firebasestorage.app",
            messagingSenderId: "735024392453",
            appId: "1:735024392453:web:30f8a1f0832ff36b1fef6c" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const id = new URLSearchParams(window.location.search).get('id');

        if (id) {
            db.collection("allNews").doc(id).get().then(doc => {
                if (doc.exists) {
                    const d = doc.data();
                    
                    // WhatsApp प्रीव्यू अपडेट करें
                    document.getElementById('og-title').setAttribute("content", d.heading);
                    document.getElementById('og-desc').setAttribute("content", d.details.substring(0, 100) + "...");
                    document.getElementById('og-image').setAttribute("content", d.image);
                    document.title = d.heading;

                    document.getElementById('newsContent').innerHTML = `
                        <h1>${d.heading}</h1>
                        <img src="${d.image}" class="news-image">
                        
                        <div class="ad-container">
                            <ins class="adsbygoogle" style="display:block" data-ad-format="auto" data-ad-full-width-responsive="true" data-ad-client="ca-pub-4298712782505661"></ins>
                        </div>

                        <p style="white-space: pre-line;">${d.details}</p>

                        <div class="ad-container">
                            <ins class="adsbygoogle" style="display:block" data-ad-format="auto" data-ad-full-width-responsive="true" data-ad-client="ca-pub-4298712782505661"></ins>
                        </div>

                        <button class="delete-btn" onclick="deleteNews('${id}')">Delete This News</button>
                    `;
                    (adsbygoogle = window.adsbygoogle || []).push({});
                    (adsbygoogle = window.adsbygoogle || []).push({});
                } else {
                    document.getElementById('newsContent').innerHTML = "<h2>News not found!</h2>";
                }
            }).catch(err => {
                document.getElementById('newsContent').innerHTML = "<h2>Error loading news.</h2>";
            });
        } else {
            document.getElementById('newsContent').innerHTML = "<h2>No News ID provided.</h2>";
        }

        // Delete News Function
        function deleteNews(newsId) {
            let pass = prompt("Enter Admin Password to Delete:");
            if (pass === "Akkshu@love") {
                db.collection("allNews").doc(newsId).delete().then(() => {
                    alert("News Deleted Successfully!");
                    window.location.href = "index.html";
                }).catch(err => {
                    alert("Error: " + err.message);
                });
            } else {
                alert("Wrong Password!");
            }
        }
    </script>
</body>
</html>
