<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" id="og-title" content="NEWS Akkshu">
    <meta property="og:description" id="og-desc" content="पूरी खबर पढ़ने के लिए यहाँ क्लिक करें।">
    <meta property="og:image" id="og-image" content="https://amazybuy.shop/1000678471.png">
    <meta property="og:type" content="article">
    <title>News Details - NEWS Akkshu</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4298712782505661" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background: #f9f9f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .news-image { width: 100%; border-radius: 8px; margin-top: 15px; }
        .ad-container { margin: 20px 0; min-height: 100px; }
        .share-btn { background: #25d366; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; font-size: 16px; }
        .stats { color: #555; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container" id="newsContent">Loading news...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAOTuJcjYGPld5wZYVPHK0jpXKAh561lVU",
            authDomain: "news-akkshu.firebaseapp.com",
            projectId: "news-akkshu",
            storageBucket: "news-akkshu.firebasestorage.app",
            messagingSenderId: "735024392453",
            appId: "1:735024392453:web:30f8a1f0832ff36b1fef6c" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const id = new URLSearchParams(window.location.search).get('id');

        if (id) {
            const docRef = db.collection("allNews").doc(id);

            // व्यूज बढ़ाएं
            docRef.update({ views: firebase.firestore.FieldValue.increment(1) }).catch(() => {});

            docRef.get().then(doc => {
                if (doc.exists) {
                    const d = doc.data();
                    document.getElementById('og-title').setAttribute("content", d.heading);
                    document.getElementById('og-desc').setAttribute("content", d.details.substring(0, 100) + "...");
                    document.getElementById('og-image').setAttribute("content", d.image);
                    document.title = d.heading;

                    document.getElementById('newsContent').innerHTML = `
                        <h1>${d.heading}</h1>
                        <p class="stats">👁️ ${d.views ? d.views + 1 : 1} Views</p>
                        <img src="${d.image}" class="news-image" alt="News Image">
                        
                        <div class="ad-container"><ins class="adsbygoogle" style="display:block" data-ad-format="auto" data-ad-full-width-responsive="true" data-ad-client="ca-pub-4298712782505661"></ins></div>
                        
                        <button class="share-btn" onclick="shareNews()">WhatsApp पर शेयर करें</button>

                        <p style="white-space: pre-line;">${d.details}</p>

                        <div class="ad-container"><ins class="adsbygoogle" style="display:block" data-ad-format="auto" data-ad-full-width-responsive="true" data-ad-client="ca-pub-4298712782505661"></ins></div>
                    `;
                    (adsbygoogle = window.adsbygoogle || []).push({});
                    (adsbygoogle = window.adsbygoogle || []).push({});
                }
            });
        }

        function shareNews() {
            const text = encodeURIComponent(document.title + "\n\nपूरी खबर यहाँ पढ़ें: " + window.location.href);
            window.open("https://wa.me/?text=" + text, "_blank");
        }
    </script>
</body>
</html>
