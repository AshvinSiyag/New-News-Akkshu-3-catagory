<form id="newsForm">
    <input type="text" id="heading" placeholder="Headline" required style="width:100%; margin-bottom:10px;">
    <input type="text" id="image" placeholder="Image URL" required style="width:100%; margin-bottom:10px;">
    <!-- नया Video URL फील्ड -->
    <input type="text" id="video" placeholder="Video URL (Optional)" style="width:100%; margin-bottom:10px;">
    <textarea id="details" rows="5" placeholder="Full News" required style="width:100%; margin-bottom:10px;"></textarea>
    
    <label>Category:</label>
    <select id="category" style="width:100%; margin-bottom:10px;">
        <option value="hindi">Hindi</option>
        <option value="english">English</option>
        <option value="gujarati">Gujarati</option>
    </select>
    
    <button type="submit">Publish News</button>
</form>

<script>
    document.getElementById('newsForm').addEventListener('submit', (e) => {
        e.preventDefault();
        db.collection("allNews").add({
            heading: document.getElementById('heading').value,
            image: document.getElementById('image').value,
            video: document.getElementById('video').value, // वीडियो यूआरएल सेव करना
            details: document.getElementById('details').value,
            category: document.getElementById('category').value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("News Published!");
            document.getElementById('newsForm').reset();
        });
    });
</script>
