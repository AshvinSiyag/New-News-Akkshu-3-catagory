<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - NEWS Akkshu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-pub { background: #d32f2f; width: 100%; }
        .btn-edit { background: #1976d2; padding: 5px 15px; }
        .btn-del { background: #000; padding: 5px 15px; }
        .news-item { background: white; padding: 15px; margin-top: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #d32f2f; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="formTitle">Admin Panel</h2>
    <input type="hidden" id="editId">
    <input type="text" id="heading" placeholder="Headline">
    <input type="text" id="image" placeholder="Image URL">
    <textarea id="details" placeholder="Full News" rows="5"></textarea>
    <select id="category">
        <option value="Hindi">Hindi</option>
        <option value="English">English</option>
        <option value="Gujarati">Gujarati</option>
    </select>
    <select id="adOption">
        <option value="none">No Ads</option>
        <option value="banner">Banner Ads</option>
        <option value="all">All Ads</option>
    </select>
    <select id="adCount">
        <option value="1">1 Ad</option>
        <option value="2">2 Ads</option>
        <option value="3">3 Ads</option>
    </select>
    <button id="actionBtn" class="btn-pub" onclick="saveNews()">Publish News</button>
</div>

<div class="container" style="margin-top:30px;">
    <h3>Posted News</h3>
    <div id="adminNewsList">Loading...</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAOTuJcjYGPld5wZYVPHK0jpXKAh561lVU", authDomain: "news-akkshu.firebaseapp.com", projectId: "news-akkshu", storageBucket: "news-akkshu.firebasestorage.app", messagingSenderId: "735024392453", appId: "1:735024392453:web:30f8a1f0832ff36b1fef6c" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function saveNews() {
        const id = document.getElementById('editId').value;
        const data = {
            heading: document.getElementById('heading').value,
            image: document.getElementById('image').value,
            details: document.getElementById('details').value,
            category: document.getElementById('category').value,
            adOption: document.getElementById('adOption').value,
            adCount: document.getElementById('adCount').value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(id) { db.collection("allNews").doc(id).update(data).then(() => { alert("Updated!"); location.reload(); }); }
        else { db.collection("allNews").add(data).then(() => { alert("Published!"); location.reload(); }); }
    }

    // डिलीट फंक्शन जोड़ा गया है
    function deleteNews(id) { 
        if(confirm("क्या आप वाकई इस न्यूज़ को डिलीट करना चाहते हैं?")) {
            db.collection("allNews").doc(id).delete().then(() => { alert("News Deleted!"); location.reload(); }); 
        }
    }

    function editNews(id, heading, image, details, category, adOption, adCount) {
        document.getElementById('editId').value = id;
        document.getElementById('heading').value = heading;
        document.getElementById('image').value = image;
        document.getElementById('details').value = details;
        document.getElementById('category').value = category;
        document.getElementById('adOption').value = adOption;
        document.getElementById('adCount').value = adCount;
        document.getElementById('formTitle').innerText = "Edit News";
        document.getElementById('actionBtn').innerText = "Update News";
        window.scrollTo(0,0);
    }

    db.collection("allNews").orderBy("timestamp", "desc").onSnapshot(snapshot => {
        const list = document.getElementById('adminNewsList'); list.innerHTML = '';
        snapshot.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `
                <div class="news-item">
                    <span>${d.heading}</span>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-edit" onclick="editNews('${doc.id}', '${d.heading.replace(/'/g, "\\'")}', '${d.image}', '${d.details.replace(/\n/g, '\\n').replace(/'/g, "\\'")}', '${d.category}', '${d.adOption}', '${d.adCount}')">Edit</button>
                        <button class="btn-del" onclick="deleteNews('${doc.id}')">Delete</button>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
