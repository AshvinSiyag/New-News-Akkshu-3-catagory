<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - NEWS Akkshu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #d32f2f; color: white; border: none; cursor: pointer; font-weight: bold; }
        .news-list { margin-top: 30px; }
        .news-item { background: white; padding: 15px; margin-top: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #d32f2f; }
    </style>
</head>
<body>

<div class="container">
    <h2>Admin Panel</h2>
    <input type="text" id="heading" placeholder="Headline">
    <input type="text" id="image" placeholder="Image URL">
    <textarea id="details" placeholder="Full News" rows="5"></textarea>
    <select id="category">
        <option value="Hindi">Hindi</option>
        <option value="English">English</option>
        <option value="Gujarati">Gujarati</option>
    </select>
    <button onclick="publishNews()">Publish News</button>
</div>

<div class="container news-list">
    <h3>Posted News</h3>
    <div id="adminNewsList">Loading...</div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAOTuJcjYGPld5wZYVPHK0jpXKAh561lVU",
        authDomain: "news-akkshu.firebaseapp.com",
        projectId: "news-akkshu",
        storageBucket: "news-akkshu.firebasestorage.app",
        messagingSenderId: "735024392453",
        appId: "1:735024392453:web:30f8a1f0832ff36b1fef6c" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // पब्लिश फंक्शन
    function publishNews() {
        const heading = document.getElementById('heading').value;
        const image = document.getElementById('image').value;
        const details = document.getElementById('details').value;
        const category = document.getElementById('category').value;

        if(heading && details) {
            db.collection("allNews").add({
                heading, image, details, category,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => { 
                alert("News Published!"); 
                location.reload(); 
            });
        } else {
            alert("Please fill in the fields.");
        }
    }

    // न्यूज़ लिस्ट लोड करना
    db.collection("allNews").orderBy("timestamp", "desc").onSnapshot(snapshot => {
        const list = document.getElementById('adminNewsList');
        list.innerHTML = '';
        snapshot.forEach(doc => {
            list.innerHTML += `
                <div class="news-item">
                    <span>${doc.data().heading}</span>
                    <button onclick="deleteNews('${doc.id}')" style="width:auto; padding:5px 15px; background:black;">Delete</button>
                </div>`;
        });
    });

    // डिलीट फंक्शन
    function deleteNews(id) {
        let pass = prompt("Enter Password to Delete:");
        if (pass === "Akkshu@love") {
            db.collection("allNews").doc(id).delete().then(() => alert("Deleted!"));
        } else if (pass !== null) {
            alert("Wrong Password!");
        }
    }
</script>
</body>
</html>
